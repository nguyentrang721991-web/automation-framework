name: Run Tests + Allure Report

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 BẮT BUỘC

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Run tests
        run: mvn clean test

      - name: Check allure-results exists
        run: ls -R allure-results

      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz

      - name: Generate report
        run: |
          ./allure-2.27.0/bin/allure generate allure-results --clean -o allure-report

      - name: Verify report folder
        run: ls -R allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report