# Environment
env=uat
base.url=https://beatchat.ai/
excel.path=src/test/resources/Login_TC.xlsx
login.sheet=M2.Login - Encrypt update
include.testcases=PK-001..PK-007
skip.testcases=PK-004,PK-006,PK-007

# Browser
browser=chrome
headless=false

# Timeout
explicit.wait=15
implicit.wait=0
assert.wait=30
app.ready.wait=30
auth.wait=60
manual.mfa.timeout=180
interactive.otp=false
chrome.profile.enabled=false
chrome.profile.dir=target/chrome-profile
sso.button.wait=20
create.group.wait=12

# Screenshot
screenshot.on.failure=true
