# Environment
env=uat
base.url=https://beatchat.ai/
excel.autodiscover=true
excel.dir=src/test/resources
excel.pattern=*.xlsx
excel.files=
excel.path=
login.sheet=TestCases
include.testcases=
skip.testcases=

# Browser
browser=chrome
headless=false

# Timeout
explicit.wait=15
implicit.wait=0
assert.wait=30
app.ready.wait=30
auth.wait=90
stay.signed.in.wait=12
manual.mfa.timeout=180
interactive.otp=false
chrome.profile.enabled=false
chrome.profile.dir=target/chrome-profile
sso.button.wait=20
create.group.wait=12

# Screenshot
screenshot.on.failure=true

